#Paper Global Configuration (Purpur 1.21.4)
#Performance Optimized

_version: 29

chunk-loading-advanced:
  auto-config-send-distance: true
  player-max-view-distance-chunks: 15
  player-movement-sampling-offset: 5
  player-movement-throttle: 0

chunk-loading-basic:
  auto-config-send-distance: true
  player-max-view-distance-chunks: 15

chunk-loading-gen-parallel:
  player-max-view-distance-chunks: 15
  player-movement-sampling-offset: 5
  player-movement-throttle: 0

chunk-system:
  io-threads: -1
  worker-threads: -1

collisions:
  enable-player-collisions: true
  send-full-pos-for-hard-colliding-entities: true

commands:
  fix-target-selector-tag-completion: true
  suggest-player-names-when-null-tab-completions: true
  time-command-affects-all-worlds: false

console:
  enable-brigadier-completions: true
  enable-brigadier-highlighting: true
  has-all-permissions: false

item-validation:
  book:
    author: 8192
    page: 16384
    title: 8192
  display-name: 8192
  lore-line: 8192
  resolve-selectors-in-books: false

logging:
  deobfuscate-stacktraces: true
  log-player-ip-addresses: true
  use-rgb-for-named-text-colors: true

messages:
  kick:
    authentication-servers-down: '&cAuthentication servers are down. Please try again later.'
    connection-throttle: '&cConnection throttled. Please wait before reconnecting.'
    connection-timeout: '&cConnection timed out.'
    flying-player: '&cFlying is not enabled on this server.'
    flying-vehicle: '&cFlying vehicles is not enabled on this server.'
  no-permission: '&cInsufficient permissions!'

misc:
  chat-threads:
    chat-executor-core-size: -1
    chat-executor-max-size: -1
  fix-entity-position-desync: true
  lag-compensate-block-breaking: true
  load-permissions-yml-before-plugins: true
  max-joins-per-tick: 5
  region-file-cache-size: 256
  strict-advancement-dimension-check: false
  use-alternative-luck-formula: false
  use-dimension-type-for-custom-spawners: false

packet-limiter:
  all-packets:
    action: KICK
    interval: 7.0
    max-packet-rate: 500.0
  kick-message: '<red>Packets flooding server!'
  overrides:
    ServerboundPlaceRecipePacket:
      action: DROP
      interval: 4.0
      max-packet-rate: 5.0

player-auto-save:
  max-per-tick: -1
  rate: 6000

proxies:
  bungee-cord:
    online-mode: true
  proxy-protocol: false
  velocity:
    enabled: false
    online-mode: false
    secret: ''

scoreboard:
  allow-non-player-entities-on-scoreboards: true
  allow-villagers-on-scoreboards: false

spam-limiter:
  incoming-packet-threshold: 300
  recipe-spam-increment: 1
  recipe-spam-limit: 20
  tab-spam-increment: 1
  tab-spam-limit: 500

timings:
  enabled: true
  hidden-config-entries:
    - database
    - proxies.velocity.secret
  history-interval: 300
  history-length: 3600
  server-name: MyCraft Server
  server-name-privacy: false
  url: https://timings.aikar.co/
  verbose: true

unsupported-settings:
  allow-grindstone-overstacking: false
  allow-headless-pistons: false
  allow-permanent-block-break-exploits: false
  allow-piston-duplication: false
  perform-username-validation: true

watchdog:
  early-warning-delay: 10000
  early-warning-every: 5000
